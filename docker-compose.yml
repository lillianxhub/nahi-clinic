services:
    db:
        image: postgres:15-alpine
        container_name: nahi-clinic-db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nahi-clinic-app
        env_file:
            - .env
        ports:
            - "3000:3000"
        depends_on:
            - db

volumes:
    postgres_data:
